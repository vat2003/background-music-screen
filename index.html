<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Modern Music Player</title>

  <style>
    :root {
      --page: #0a0b0c;
      --shell: #edf1f5;
      --shell-edge: #bac3cf;
      --shell-shadow: #8c96a3;
      --screen: #07110d;
      --screen-soft: #0e2017;
      --line: rgba(255, 255, 255, 0.14);
      --line-strong: rgba(137, 255, 187, 0.42);
      --text: #f4f1e8;
      --muted: rgba(244, 241, 232, 0.58);
      --device-muted: rgba(31, 37, 45, 0.58);
      --green: #89ffbb;
      --green-strong: #48d984;
      --amber: #f4c95d;
      --red: #f07167;
      --ink: #1f252d;
      --shadow: rgba(0, 0, 0, 0.56);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(137, 255, 187, 0.11), transparent 34%),
        linear-gradient(145deg, #161719 0%, var(--page) 48%, #050607 100%);
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 24px;
    }

    .app {
      width: min(1120px, 100%);
    }

    .radio {
      min-height: calc(100vh - 48px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 38px;
      color: var(--amber);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .brand::after {
      content: "Classic Pocket Player";
      color: rgba(244, 241, 232, 0.48);
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
      text-transform: none;
    }

    .radio-body {
      display: grid;
      grid-template-columns: minmax(340px, 420px) minmax(320px, 1fr);
      gap: 28px;
      min-height: 0;
      align-items: center;
    }

    .speaker {
      display: none;
    }

    .center-panel,
    .add-box {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent),
        rgba(7, 8, 9, 0.36);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 0 28px rgba(0, 0, 0, 0.24);
    }

    .center-panel {
      position: relative;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 20px;
      justify-items: center;
      width: min(420px, 100%);
      min-height: 690px;
      margin: 0 auto;
      padding: 34px 30px 32px;
      border-color: rgba(255, 255, 255, 0.72);
      border-radius: 46px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(219, 225, 233, 0.98) 48%, rgba(178, 187, 199, 0.98)),
        var(--shell);
      box-shadow:
        0 36px 90px rgba(0, 0, 0, 0.42),
        inset 0 2px 0 rgba(255, 255, 255, 0.85),
        inset 0 -20px 38px rgba(77, 87, 101, 0.2);
    }

    .center-panel::before,
    .center-panel::after {
      content: "";
      position: absolute;
      top: 15px;
      bottom: auto;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 0;
      background: rgba(31, 37, 45, 0.22);
      box-shadow: none;
      pointer-events: none;
    }

    .center-panel::before {
      left: calc(50% - 18px);
    }

    .center-panel::after {
      right: calc(50% - 18px);
    }

    .screen {
      width: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: minmax(236px, 1fr) auto;
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(0, 0, 0, 0.18);
      border-radius: 16px;
      background:
        linear-gradient(180deg, #202b38, var(--screen));
      box-shadow:
        inset 0 0 28px rgba(0, 0, 0, 0.56),
        0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .player-wrap {
      width: min(176px, 58%);
      aspect-ratio: 16 / 9;
      align-self: end;
      justify-self: end;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      background: #000;
      box-shadow:
        inset 0 0 24px rgba(0, 0, 0, 0.7),
        0 14px 34px rgba(0, 0, 0, 0.34);
      opacity: 0.82;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .display-text {
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 6px 2px 12px;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .status-light {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.24);
    }

    .dot.on {
      background: var(--green);
      box-shadow: 0 0 16px rgba(137, 255, 187, 0.72);
    }

    .track-title {
      color: #edfff5;
      font-family: "Courier New", monospace;
      font-size: clamp(22px, 7vw, 34px);
      font-weight: 800;
      line-height: 1.1;
      text-shadow: 0 0 18px rgba(137, 255, 187, 0.26);
      word-break: break-word;
    }

    .controls {
      display: grid;
      grid-template-areas:
        ". power ."
        "prev play next"
        "shuffle . repeat";
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 0;
      width: 280px;
      height: 280px;
      padding: 18px;
      border: 1px solid rgba(31, 37, 45, 0.12);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(237, 241, 245, 0.98) 0 31%, transparent 32%),
        linear-gradient(145deg, #f8fafc, #c8d0da);
      box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 0.9),
        inset 0 -10px 22px rgba(95, 105, 118, 0.18),
        0 18px 34px rgba(31, 37, 45, 0.2);
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      color: rgba(31, 37, 45, 0.76);
      background: transparent;
      font-weight: 800;
      padding: 10px 12px;
      box-shadow: none;
      transition: transform 0.08s ease, border-color 0.15s ease, background 0.15s ease;
      user-select: none;
    }

    button:hover {
      background: rgba(31, 37, 45, 0.08);
    }

    button:active {
      transform: translateY(1px);
    }

    button:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 3px;
    }

    button.primary {
      width: 92px;
      height: 92px;
      justify-self: center;
      align-self: center;
      color: #0b1510;
      background: linear-gradient(180deg, var(--green), var(--green-strong));
      border: 1px solid rgba(72, 217, 132, 0.56);
      box-shadow:
        0 0 28px rgba(72, 217, 132, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.42);
    }

    button.secondary {
      color: rgba(31, 37, 45, 0.62);
      background: transparent;
    }

    button.danger {
      color: #ffe6e5;
      background: linear-gradient(180deg, rgba(240, 113, 103, 0.26), rgba(40, 13, 12, 0.7));
      border-color: rgba(240, 113, 103, 0.3);
    }

    #powerBtn {
      grid-area: power;
      align-self: start;
      justify-self: center;
    }

    #prevBtn {
      grid-area: prev;
      align-self: center;
      justify-self: start;
    }

    #playBtn {
      grid-area: play;
    }

    #nextBtn {
      grid-area: next;
      align-self: center;
      justify-self: end;
    }

    #shuffleBtn {
      grid-area: shuffle;
      align-self: end;
      justify-self: start;
      font-size: 11px;
    }

    #repeatBtn {
      grid-area: repeat;
      align-self: end;
      justify-self: end;
      font-size: 11px;
    }

    .volume-box {
      display: grid;
      grid-template-columns: 78px 1fr 48px;
      gap: 12px;
      align-items: center;
      width: min(300px, 100%);
      padding: 0;
      color: var(--device-muted);
      font-size: 13px;
      font-weight: 800;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--green);
    }

    .add-box {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      align-content: start;
      padding: 14px;
      min-height: 0;
    }

    .add-form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      outline: 0;
      border-radius: 8px;
      padding: 11px 13px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 14px;
    }

    input::placeholder {
      color: rgba(242, 245, 237, 0.42);
    }

    .add-button {
      color: #141008;
      background: linear-gradient(180deg, #f0d98c, var(--amber));
      border-color: rgba(233, 196, 106, 0.72);
    }

    .playlist {
      min-height: 0;
      max-height: none;
      margin-top: 14px;
      overflow: auto;
      padding-right: 4px;
    }

    .playlist::-webkit-scrollbar {
      width: 10px;
    }

    .playlist::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
    }

    .playlist::-webkit-scrollbar-thumb {
      background: rgba(137, 255, 187, 0.28);
      border-radius: 8px;
    }

    .playlist-item {
      position: relative;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 62px;
      margin-bottom: 8px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
    }

    .playlist-item.active {
      border-color: var(--line-strong);
      background: linear-gradient(90deg, rgba(137, 255, 187, 0.16), rgba(255, 255, 255, 0.045));
    }

    .playlist-item.active::before {
      content: "";
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 0;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--green);
    }

    .mini-btn {
      min-height: 34px;
      padding: 8px 10px;
      font-size: 12px;
    }

    .song-main {
      min-width: 0;
    }

    .song-title {
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .song-meta {
      margin-top: 5px;
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 12px;
    }

    .empty {
      padding: 22px;
      border: 1px dashed rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.035);
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      body {
        align-items: flex-start;
        padding: 14px;
      }

      .radio {
        min-height: auto;
        padding: 14px;
      }

      .radio-body {
        grid-template-columns: 1fr;
      }

      .screen {
        grid-template-columns: 1fr;
      }

      .display-text {
        min-height: 240px;
      }

      .controls,
      .volume-box {
        padding-left: 0;
        padding-right: 0;
      }

      .add-box {
        min-height: 360px;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .radio {
        padding: 10px;
      }

      .brand {
        display: block;
        min-height: auto;
        line-height: 1.5;
      }

      .brand::after {
        display: block;
      }

      .center-panel,
      .add-box {
        padding: 10px;
      }

      .center-panel {
        min-height: auto;
        border-radius: 36px;
      }

      .center-panel::before,
      .center-panel::after {
        display: none;
      }

      .controls {
        width: 238px;
        height: 238px;
        grid-template-areas:
          ". power ."
          "prev play next"
          "shuffle . repeat";
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr;
        padding: 15px;
      }

      button.primary {
        width: 78px;
        height: 78px;
      }

      .volume-box {
        grid-template-columns: 1fr 1fr;
      }

      .volume-box span:first-child,
      .volume-box input {
        grid-column: 1 / -1;
      }

      .playlist-item {
        grid-template-columns: 1fr auto;
      }

      .playlist-item .mini-btn:first-child {
        grid-column: 1 / -1;
      }
    }

    /* Retro tabletop radio skin */
    :root {
      --wood: #7c4d2f;
      --wood-dark: #321a10;
      --wood-mid: #9a6139;
      --cream: #f1d8a8;
      --cream-deep: #c99753;
      --radio-ink: #261409;
      --radio-muted: rgba(58, 34, 17, 0.68);
      --radio-screen: #102015;
      --radio-green: #94ffb7;
      --radio-amber: #ffd37a;
      --radio-line: rgba(255, 220, 160, 0.22);
      --radio-shadow: rgba(0, 0, 0, 0.58);
    }

    body {
      color: var(--radio-ink);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 211, 122, 0.16), transparent 30%),
        linear-gradient(145deg, #20150f 0%, #090706 62%, #050403 100%);
      align-items: center;
    }

    .app {
      width: min(1060px, 100%);
    }

    .radio {
      width: 100%;
      min-height: auto;
      display: block;
      padding: 22px;
      border: 1px solid rgba(255, 226, 176, 0.22);
      border-radius: 28px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.1), transparent 16%, transparent 84%, rgba(0, 0, 0, 0.2)),
        repeating-linear-gradient(90deg, rgba(255, 238, 205, 0.035) 0 2px, transparent 2px 13px),
        linear-gradient(145deg, var(--wood-mid), var(--wood) 44%, var(--wood-dark));
      box-shadow:
        0 34px 90px var(--radio-shadow),
        inset 0 2px 7px rgba(255, 245, 220, 0.28),
        inset 0 -18px 32px rgba(0, 0, 0, 0.28);
    }

    .brand {
      min-height: 28px;
      margin-bottom: 14px;
      color: var(--radio-amber);
      justify-content: center;
      gap: 16px;
      font-family: "Courier New", monospace;
      font-size: 14px;
      letter-spacing: 3px;
      text-align: center;
      text-shadow: 0 0 12px rgba(255, 211, 122, 0.36);
    }

    .brand::after {
      content: "FM / YOUTUBE";
      color: rgba(255, 230, 184, 0.62);
      font-family: "Courier New", monospace;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .radio-body {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(120px, 1fr) minmax(420px, 520px) minmax(120px, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .speaker {
      display: block;
      min-height: 590px;
      border: 8px solid rgba(24, 13, 8, 0.5);
      border-radius: 18px;
      background:
        radial-gradient(circle, rgba(255, 211, 122, 0.1) 0 3px, transparent 4px),
        repeating-linear-gradient(90deg, #111 0 7px, #262626 7px 12px);
      background-size: 18px 18px, auto;
      box-shadow:
        inset 0 0 36px rgba(0, 0, 0, 0.86),
        0 1px 0 rgba(255, 255, 255, 0.13);
    }

    .center-panel {
      width: 100%;
      min-height: 590px;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 12px;
      margin: 0;
      padding: 16px;
      border: 1px solid rgba(255, 232, 190, 0.26);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255, 244, 218, 0.08), transparent 24%),
        #24150e;
      box-shadow:
        inset 0 0 34px rgba(0, 0, 0, 0.52),
        0 8px 24px rgba(0, 0, 0, 0.22);
      justify-items: stretch;
    }

    .center-panel::before,
    .center-panel::after {
      display: none;
    }

    .screen {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 142px;
      grid-template-rows: auto;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(148, 255, 183, 0.22);
      border-radius: 14px;
      background:
        linear-gradient(180deg, #13261a, var(--radio-screen));
      box-shadow:
        inset 0 0 26px rgba(148, 255, 183, 0.1),
        0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .display-text {
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 8px 2px 4px;
      color: #eaffef;
      background: transparent;
    }

    .status-row {
      color: var(--radio-green);
      font-family: "Courier New", monospace;
      font-size: 12px;
      text-transform: uppercase;
    }

    .dot.on {
      background: var(--radio-green);
      box-shadow: 0 0 12px rgba(148, 255, 183, 0.72);
    }

    .track-title {
      color: #f2fff4;
      font-family: "Courier New", monospace;
      font-size: 18px;
      line-height: 1.25;
      text-shadow: 0 0 12px rgba(148, 255, 183, 0.22);
    }

    .player-wrap {
      width: 142px;
      height: 80px;
      min-height: 0;
      align-self: end;
      justify-self: end;
      aspect-ratio: auto;
      border-radius: 10px;
      opacity: 0.72;
      box-shadow:
        inset 0 0 20px rgba(0, 0, 0, 0.82),
        0 0 14px rgba(148, 255, 183, 0.08);
    }

    .controls {
      width: 100%;
      height: auto;
      display: grid;
      grid-template-areas: none;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(255, 232, 190, 0.18);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.2);
      box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.24);
    }

    button {
      min-height: 40px;
      width: auto;
      height: auto;
      border: 1px solid rgba(255, 221, 164, 0.24);
      border-radius: 999px;
      color: var(--radio-ink);
      background: linear-gradient(180deg, #ffe1a5, #ba7836);
      font-size: 13px;
      box-shadow:
        0 4px 0 #4c2c15,
        0 8px 12px rgba(0, 0, 0, 0.28);
    }

    button:hover {
      background: linear-gradient(180deg, #ffeabf, #c68642);
    }

    button:active {
      transform: translateY(3px);
      box-shadow:
        0 1px 0 #4c2c15,
        0 4px 8px rgba(0, 0, 0, 0.22);
    }

    button.primary {
      width: auto;
      height: auto;
      color: #07130a;
      background: linear-gradient(180deg, #9cffbf, #3fb56f);
      border-color: rgba(148, 255, 183, 0.58);
    }

    button.secondary {
      color: #1b1309;
      background: linear-gradient(180deg, #e6e0d0, #94846a);
      border-color: rgba(255, 255, 255, 0.18);
    }

    button.danger {
      color: #fff0ea;
      background: linear-gradient(180deg, #df6f52, #84311f);
      border-color: rgba(255, 170, 146, 0.28);
    }

    #powerBtn,
    #prevBtn,
    #playBtn,
    #nextBtn,
    #shuffleBtn,
    #repeatBtn {
      grid-area: auto;
      align-self: stretch;
      justify-self: stretch;
      font-size: 13px;
    }

    .volume-box {
      width: 100%;
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) 44px;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 14px;
      color: var(--cream);
      background: rgba(0, 0, 0, 0.16);
      font-size: 13px;
    }

    input[type="range"] {
      accent-color: var(--radio-amber);
    }

    .add-box {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      padding: 12px;
      border: 1px solid rgba(255, 232, 190, 0.16);
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent),
        rgba(0, 0, 0, 0.2);
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.22);
    }

    .add-form {
      grid-template-columns: minmax(0, 1fr) minmax(118px, 0.42fr) auto;
      gap: 8px;
    }

    input {
      min-height: 38px;
      border: 1px solid rgba(255, 226, 176, 0.18);
      border-radius: 999px;
      color: #251407;
      background: #fff1cd;
      font-size: 13px;
    }

    input::placeholder {
      color: rgba(37, 20, 7, 0.42);
    }

    .add-button {
      color: #201207;

<body>
  <div class="app">
    <div class="radio">
      <div class="brand">Modern Music Player</div>

      <div class="radio-body">
        <div class="speaker speaker-left"></div>

        <div class="center-panel">
          <div class="screen">
            <div class="display-text">
              <div class="status-row">
                <span class="status-light">
                  <span id="statusDot" class="dot"></span>
                  <span id="statusText">READY</span>
                </span>
                <span id="counterText">0 tracks</span>
              </div>
              <div id="nowPlaying" class="track-title">Paste a YouTube link to build your own radio playlist.</div>
            </div>

            <div class="player-wrap">
              <div id="player"></div>
            </div>
          </div>

          <div class="controls">
            <button id="powerBtn">Power</button>
            <button id="prevBtn">Prev</button>
            <button id="playBtn" class="primary">Play</button>
            <button id="nextBtn">Next</button>
            <button id="shuffleBtn" class="secondary">Shuffle: Off</button>
            <button id="repeatBtn" class="secondary">Repeat: All</button>
          </div>

          <div class="volume-box">
            <span>Volume</span>
            <input id="volumeSlider" type="range" min="0" max="100" value="70" />
            <span id="volumeText">70%</span>
          </div>

          <div class="add-box">
            <form id="addForm" class="add-form">
              <input id="youtubeUrl" type="text" placeholder="Paste YouTube link here..." autocomplete="off" />
              <input id="customTitle" type="text" placeholder="Optional title..." autocomplete="off" />
              <button type="submit" class="add-button">Add</button>
            </form>

            <div class="hint">
              Supports youtube.com/watch, youtu.be, /embed, /shorts, and /live links.
              Playlist is saved in this browser using localStorage.
            </div>

            <div id="playlist" class="playlist"></div>
          </div>
        </div>

        <div class="speaker speaker-right"></div>
      </div>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    const STORAGE_KEY = "retro_youtube_radio_playlist_v1";
    const INDEX_KEY = "retro_youtube_radio_current_index_v1";

    const addForm = document.getElementById("addForm");
    const youtubeUrlInput = document.getElementById("youtubeUrl");
    const customTitleInput = document.getElementById("customTitle");
    const playlistEl = document.getElementById("playlist");

    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const counterText = document.getElementById("counterText");
    const nowPlaying = document.getElementById("nowPlaying");

    const powerBtn = document.getElementById("powerBtn");
    const prevBtn = document.getElementById("prevBtn");
    const playBtn = document.getElementById("playBtn");
    const nextBtn = document.getElementById("nextBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const repeatBtn = document.getElementById("repeatBtn");
    const volumeSlider = document.getElementById("volumeSlider");
    const volumeText = document.getElementById("volumeText");

    let player = null;
    let isPlayerReady = false;
    let isPoweredOn = true;
    let isShuffle = false;
    let repeatMode = "all"; // off | all | one

    let playlist = loadPlaylist();
    let currentIndex = Number(localStorage.getItem(INDEX_KEY) || 0);

    if (currentIndex < 0 || currentIndex >= playlist.length) {
      currentIndex = 0;
    }

    const PAGE_ORIGIN =
        location.protocol === "http:" || location.protocol === "https:"
            ? location.origin
            : "";

        window.onYouTubeIframeAPIReady = function () {
        player = new YT.Player("player", {
            videoId: playlist[currentIndex]?.videoId || "",
            host: "https://www.youtube.com",
            playerVars: {
            playsinline: 1,
            controls: 1,
            rel: 0,
            origin: PAGE_ORIGIN
            },
            events: {
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange
            }
        });
        };

    function onPlayerReady() {
      isPlayerReady = true;
      player.setVolume(Number(volumeSlider.value));

      if (playlist.length > 0) {
        cueTrack(currentIndex);
        setStatus("READY");
      } else {
        setStatus("EMPTY");
      }

      renderPlaylist();
      updateNowPlaying();
    }

    function onPlayerStateChange(event) {
      if (!isPoweredOn) return;

      if (event.data === YT.PlayerState.PLAYING) {
        setStatus("PLAYING");
        saveVideoTitleFromPlayer();
        playBtn.textContent = "Pause";
      }

      if (event.data === YT.PlayerState.PAUSED) {
        setStatus("PAUSED");
        playBtn.textContent = "Play";
      }

      if (event.data === YT.PlayerState.BUFFERING) {
        setStatus("TUNING");
      }

      if (event.data === YT.PlayerState.CUED) {
        setStatus("READY");
        playBtn.textContent = "Play";
      }

      if (event.data === YT.PlayerState.ENDED) {
        playBtn.textContent = "Play";

        if (repeatMode === "one") {
          playTrack(currentIndex);
          return;
        }

        nextTrack(true);
      }
    }

    function extractYouTubeId(input) {
      const raw = input.trim();

      if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) {
        return raw;
      }

      try {
        const url = new URL(raw);
        const host = url.hostname.replace("www.", "");

        if (host === "youtu.be") {
          return cleanId(url.pathname.split("/")[1]);
        }

        if (host.includes("youtube.com")) {
          const watchId = url.searchParams.get("v");
          if (watchId) return cleanId(watchId);

          const parts = url.pathname.split("/").filter(Boolean);
          const knownPaths = ["embed", "shorts", "live"];

          for (const path of knownPaths) {
            const index = parts.indexOf(path);
            if (index !== -1 && parts[index + 1]) {
              return cleanId(parts[index + 1]);
            }
          }
        }

        return null;
      } catch {
        return null;
      }
    }

    function cleanId(id) {
      if (!id) return null;
      const cleaned = id.split("?")[0].split("&")[0].trim();
      return /^[a-zA-Z0-9_-]{11}$/.test(cleaned) ? cleaned : null;
    }

    function addTrack(url, customTitle) {
      const videoId = extractYouTubeId(url);

      if (!videoId) {
        alert("Invalid YouTube link.");
        return;
      }

      const exists = playlist.some(track => track.videoId === videoId);
      if (exists) {
        alert("This video is already in your radio playlist.");
        return;
      }

      const track = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        videoId,
        url,
        title: customTitle.trim() || "YouTube Track " + videoId,
        addedAt: Date.now(),
        playCount: 0
      };

      playlist.push(track);
      savePlaylist();

      if (playlist.length === 1) {
        currentIndex = 0;
        saveCurrentIndex();
        cueTrack(0);
      }

      renderPlaylist();
      updateNowPlaying();
      setStatus("ADDED");
    }

    function playTrack(index) {
      if (!isPlayerReady || !isPoweredOn || !playlist[index]) return;

      currentIndex = index;
      playlist[currentIndex].playCount += 1;

      saveCurrentIndex();
      savePlaylist();
      renderPlaylist();
      updateNowPlaying();

      player.loadVideoById(playlist[currentIndex].videoId);
      setStatus("TUNING");
    }

    function cueTrack(index) {
      if (!isPlayerReady || !playlist[index]) return;

      currentIndex = index;
      saveCurrentIndex();
      renderPlaylist();
      updateNowPlaying();

      player.cueVideoById(playlist[currentIndex].videoId);
    }

    function togglePlay() {
      if (!isPlayerReady || !isPoweredOn) return;

      if (playlist.length === 0) {
        setStatus("EMPTY");
        return;
      }

      const state = player.getPlayerState();

      if (state === YT.PlayerState.PLAYING) {
        player.pauseVideo();
      } else {
        if (state === YT.PlayerState.UNSTARTED || state === YT.PlayerState.CUED || state === -1) {
          playTrack(currentIndex);
        } else {
          player.playVideo();
        }
      }
    }

    function nextTrack(fromEnded = false) {
      if (playlist.length === 0) return;

      if (playlist.length === 1) {
        if (fromEnded && repeatMode === "off") {
          setStatus("FINISHED");
          return;
        }

        playTrack(0);
        return;
      }

      let nextIndex;

      if (isShuffle) {
        do {
          nextIndex = Math.floor(Math.random() * playlist.length);
        } while (nextIndex === currentIndex);
      } else {
        nextIndex = currentIndex + 1;
      }

      if (nextIndex >= playlist.length) {
        if (fromEnded && repeatMode === "off") {
          setStatus("FINISHED");
          return;
        }

        nextIndex = 0;
      }

      playTrack(nextIndex);
    }

    function prevTrack() {
      if (playlist.length === 0) return;

      let prevIndex = currentIndex - 1;

      if (prevIndex < 0) {
        prevIndex = playlist.length - 1;
      }

      playTrack(prevIndex);
    }

    function removeTrack(index) {
      const removingCurrent = index === currentIndex;

      playlist.splice(index, 1);

      if (currentIndex >= playlist.length) {
        currentIndex = Math.max(0, playlist.length - 1);
      }

      savePlaylist();
      saveCurrentIndex();
      renderPlaylist();

      if (playlist.length === 0) {
        if (isPlayerReady) player.stopVideo();
        setStatus("EMPTY");
        nowPlaying.textContent = "Your radio playlist is empty.";
        return;
      }

      if (removingCurrent) {
        cueTrack(currentIndex);
      } else {
        updateNowPlaying();
      }
    }

    function saveVideoTitleFromPlayer() {
      if (!player || !playlist[currentIndex]) return;

      const data = player.getVideoData();
      const title = data && data.title ? data.title.trim() : "";

      if (title && title !== playlist[currentIndex].title) {
        playlist[currentIndex].title = title;
        savePlaylist();
        renderPlaylist();
        updateNowPlaying();
      }
    }

    function cycleRepeatMode() {
      if (repeatMode === "all") {
        repeatMode = "one";
      } else if (repeatMode === "one") {
        repeatMode = "off";
      } else {
        repeatMode = "all";
      }

      repeatBtn.textContent = "Repeat: " + capitalize(repeatMode);
    }

    function togglePower() {
      isPoweredOn = !isPoweredOn;

      if (!isPoweredOn) {
        if (isPlayerReady) player.stopVideo();
        setStatus("OFF");
        playBtn.textContent = "Play";
        powerBtn.textContent = "Power On";
        return;
      }

      powerBtn.textContent = "Power";
      setStatus("READY");

      if (playlist.length > 0) {
        cueTrack(currentIndex);
      }
    }

    function setStatus(text) {
      statusText.textContent = text;
      statusDot.classList.toggle("on", ["READY", "PLAYING", "TUNING", "ADDED", "PAUSED"].includes(text));
    }

    function updateNowPlaying() {
      counterText.textContent = playlist.length + (playlist.length === 1 ? " track" : " tracks");

      if (playlist.length === 0) {
        nowPlaying.textContent = "Paste a YouTube link to build your own radio playlist.";
        return;
      }

      const track = playlist[currentIndex];
      nowPlaying.textContent = "Now: " + track.title;
    }

    function renderPlaylist() {
      playlistEl.innerHTML = "";

      updateNowPlaying();

      if (playlist.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No tracks yet. Add your first YouTube link.";
        playlistEl.appendChild(empty);
        return;
      }

      playlist.forEach((track, index) => {
        const item = document.createElement("div");
        item.className = "playlist-item" + (index === currentIndex ? " active" : "");

        const playButton = document.createElement("button");
        playButton.className = "mini-btn";
        playButton.textContent = index === currentIndex ? "Tune" : "Play";
        playButton.addEventListener("click", () => playTrack(index));

        const main = document.createElement("div");
        main.className = "song-main";

        const title = document.createElement("div");
        title.className = "song-title";
        title.textContent = track.title;

        const meta = document.createElement("div");
        meta.className = "song-meta";
        meta.textContent = "ID: " + track.videoId + " | Plays: " + track.playCount;

        main.appendChild(title);
        main.appendChild(meta);

        const removeButton = document.createElement("button");
        removeButton.className = "mini-btn danger";
        removeButton.textContent = "Remove";
        removeButton.addEventListener("click", () => removeTrack(index));

        item.appendChild(playButton);
        item.appendChild(main);
        item.appendChild(removeButton);

        playlistEl.appendChild(item);
      });
    }

    function loadPlaylist() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function savePlaylist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(playlist));
    }

    function saveCurrentIndex() {
      localStorage.setItem(INDEX_KEY, String(currentIndex));
    }

    function capitalize(text) {
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    addForm.addEventListener("submit", event => {
      event.preventDefault();

      addTrack(youtubeUrlInput.value, customTitleInput.value);

      youtubeUrlInput.value = "";
      customTitleInput.value = "";
      youtubeUrlInput.focus();
    });

    playBtn.addEventListener("click", togglePlay);
    nextBtn.addEventListener("click", () => nextTrack(false));
    prevBtn.addEventListener("click", prevTrack);
    powerBtn.addEventListener("click", togglePower);

    shuffleBtn.addEventListener("click", () => {
      isShuffle = !isShuffle;
      shuffleBtn.textContent = "Shuffle: " + (isShuffle ? "On" : "Off");
    });

    repeatBtn.addEventListener("click", cycleRepeatMode);

    volumeSlider.addEventListener("input", () => {
      const volume = Number(volumeSlider.value);
      volumeText.textContent = volume + "%";

      if (isPlayerReady) {
        player.setVolume(volume);
      }
    });

    renderPlaylist();
  </script>
</body>
</html>
